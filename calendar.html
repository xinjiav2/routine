<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep:    #1c1b22;
    --bg-mid:     #252430;
    --bg-surface: #2d2b3d;
    --bg-hover:   #343248;
    --bg-active:  #3d3a56;
    --border:     rgba(255,255,255,0.08);
    --text-pri:   #e8e6f0;
    --text-sec:   #9e9ab8;
    --text-muted: #5e5a78;
    --accent:     #6d4aff;
    --accent-lt:  #8b6fff;
    --accent-dim: rgba(109,74,255,0.18);
    --today-ring: #6d4aff;
    --red:        #e5584a;
    --green:      #3db88a;
    --yellow:     #f0c040;
    --blue:       #4a9eff;
    --radius:     10px;
    --sidebar-w:  240px;
    --header-h:   56px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-deep);
    color: var(--text-pri);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── TOP BAR ── */
  header {
    height: var(--header-h);
    background: var(--bg-mid);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-pri);
    letter-spacing: -0.3px;
    text-decoration: none;
    margin-right: 8px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: grid;
    place-items: center;
    font-size: 13px;
  }

  .header-nav-btn {
    background: none;
    border: none;
    color: var(--text-sec);
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    transition: background .15s, color .15s;
  }
  .header-nav-btn:hover { background: var(--bg-hover); color: var(--text-pri); }

  .header-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-pri);
    min-width: 160px;
  }

  .header-spacer { flex: 1; }

  .view-switcher {
    display: flex;
    background: var(--bg-surface);
    border-radius: 7px;
    padding: 3px;
    gap: 2px;
  }
  .view-btn {
    background: none;
    border: none;
    color: var(--text-sec);
    cursor: pointer;
    padding: 5px 12px;
    border-radius: 5px;
    font-size: 12.5px;
    font-family: inherit;
    font-weight: 500;
    transition: background .15s, color .15s;
  }
  .view-btn.active { background: var(--bg-active); color: var(--text-pri); }
  .view-btn:hover:not(.active) { color: var(--text-pri); }

  .today-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-pri);
    cursor: pointer;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    transition: background .15s, border-color .15s;
  }
  .today-btn:hover { background: var(--bg-hover); border-color: rgba(255,255,255,.16); }

  .new-event-btn {
    background: var(--accent);
    border: none;
    color: #fff;
    cursor: pointer;
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background .15s, transform .1s;
  }
  .new-event-btn:hover { background: var(--accent-lt); }
  .new-event-btn:active { transform: scale(.97); }

  /* ── LAYOUT ── */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  aside {
    width: var(--sidebar-w);
    background: var(--bg-mid);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px 12px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .mini-cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .mini-cal-title {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-sec);
    text-transform: uppercase;
    letter-spacing: .8px;
  }
  .mini-nav { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 3px 5px; border-radius: 4px; transition: color .15s; }
  .mini-nav:hover { color: var(--text-pri); }

  .mini-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 18px;
  }
  .mini-dow {
    text-align: center;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-muted);
    padding: 3px 0;
    text-transform: uppercase;
  }
  .mini-day {
    text-align: center;
    font-size: 11.5px;
    padding: 4px 2px;
    border-radius: 50%;
    cursor: pointer;
    color: var(--text-sec);
    transition: background .12s, color .12s;
    line-height: 1.6;
  }
  .mini-day:hover { background: var(--bg-hover); color: var(--text-pri); }
  .mini-day.today { background: var(--accent); color: #fff; font-weight: 600; }
  .mini-day.selected:not(.today) { background: var(--accent-dim); color: var(--accent-lt); }
  .mini-day.other-month { color: var(--text-muted); opacity: .5; }

  .sidebar-section-title {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: .9px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 6px;
    margin: 12px 0 6px;
  }

  .cal-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 8px;
    border-radius: 7px;
    cursor: pointer;
    transition: background .12s;
    font-size: 13px;
    color: var(--text-sec);
  }
  .cal-item:hover { background: var(--bg-hover); color: var(--text-pri); }
  .cal-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cal-item input[type=checkbox] { accent-color: var(--accent); }

  /* ── MAIN CALENDAR ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .cal-grid-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
    background: var(--bg-mid);
    flex-shrink: 0;
  }
  .cal-dow {
    padding: 10px 0 9px;
    text-align: center;
    font-size: 11.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .7px;
    color: var(--text-muted);
  }
  .cal-dow.weekend { color: var(--text-muted); opacity: .7; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(6, 1fr);
    flex: 1;
    overflow: hidden;
  }

  .cal-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px 10px 6px;
    min-height: 0;
    overflow: hidden;
    cursor: pointer;
    transition: background .12s;
    display: flex;
    flex-direction: column;
    gap: 3px;
    position: relative;
  }
  .cal-cell:hover { background: rgba(255,255,255,0.025); }
  .cal-cell:nth-child(7n) { border-right: none; }

  .day-num {
    font-size: 13px;
    font-weight: 500;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: var(--text-sec);
    align-self: flex-start;
    flex-shrink: 0;
    transition: background .12s, color .12s;
  }
  .cal-cell:hover .day-num { color: var(--text-pri); }
  .cal-cell.today .day-num {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .cal-cell.other-month .day-num { color: var(--text-muted); opacity: .45; }
  .cal-cell.selected:not(.today) .day-num {
    background: var(--accent-dim);
    color: var(--accent-lt);
  }

  .event-pill {
    font-size: 11.5px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: filter .12s;
    flex-shrink: 0;
  }
  .event-pill:hover { filter: brightness(1.15); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 420px;
    max-width: 95vw;
    padding: 24px;
    box-shadow: 0 24px 60px rgba(0,0,0,.5);
    transform: translateY(8px);
    transition: transform .18s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-pri);
  }
  .modal-close {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 18px; padding: 2px 6px;
    border-radius: 5px; transition: color .12s, background .12s;
  }
  .modal-close:hover { color: var(--text-pri); background: var(--bg-hover); }

  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text-sec); margin-bottom: 5px; display: block; }
  .form-input {
    width: 100%;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text-pri);
    font-family: inherit;
    font-size: 13.5px;
    padding: 9px 12px;
    outline: none;
    transition: border-color .15s;
  }
  .form-input:focus { border-color: var(--accent); }

  .color-row { display: flex; gap: 8px; margin-top: 6px; }
  .color-swatch {
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: border-color .12s, transform .1s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: #fff; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel {
    background: none; border: 1px solid var(--border); color: var(--text-sec);
    cursor: pointer; padding: 8px 16px; border-radius: 7px; font-size: 13px;
    font-family: inherit; font-weight: 500; transition: background .12s, color .12s;
  }
  .btn-cancel:hover { background: var(--bg-hover); color: var(--text-pri); }
  .btn-save {
    background: var(--accent); border: none; color: #fff;
    cursor: pointer; padding: 8px 18px; border-radius: 7px; font-size: 13px;
    font-family: inherit; font-weight: 500; transition: background .12s;
  }
  .btn-save:hover { background: var(--accent-lt); }

  /* event detail popover */
  .popover {
    position: fixed;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    width: 240px;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity .15s;
  }
  .popover.open { opacity: 1; pointer-events: all; }
  .popover-title { font-size: 14px; font-weight: 600; color: var(--text-pri); margin-bottom: 4px; }
  .popover-date { font-size: 12px; color: var(--text-sec); margin-bottom: 10px; }
  .popover-actions { display: flex; gap: 6px; }
  .popover-btn {
    background: var(--bg-hover); border: none; color: var(--text-sec);
    cursor: pointer; padding: 5px 10px; border-radius: 5px; font-size: 11.5px;
    font-family: inherit; transition: background .12s, color .12s;
  }
  .popover-btn:hover { background: var(--bg-active); color: var(--text-pri); }
  .popover-btn.danger:hover { background: rgba(229,88,74,.2); color: var(--red); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#">
    <div class="logo-icon">📅</div>
    Calendar
  </a>
  <button class="today-btn" onclick="goToday()">Today</button>
  <button class="header-nav-btn" onclick="prevMonth()">&#8249;</button>
  <span class="header-title" id="headerTitle"></span>
  <button class="header-nav-btn" onclick="nextMonth()">&#8250;</button>
  <div class="header-spacer"></div>
  <div class="view-switcher">
    <button class="view-btn active">Month</button>
    <button class="view-btn" onclick="alert('Week view coming soon!')">Week</button>
    <button class="view-btn" onclick="alert('Day view coming soon!')">Day</button>
  </div>
  <button class="new-event-btn" onclick="openNewEventModal()">
    <span style="font-size:16px;line-height:1">+</span> New event
  </button>
</header>

<div class="app-body">

  <!-- SIDEBAR -->
  <aside>
    <div class="mini-cal-header">
      <span class="mini-cal-title" id="miniTitle"></span>
      <div style="display:flex;gap:2px">
        <button class="mini-nav" onclick="prevMonth()">&#8249;</button>
        <button class="mini-nav" onclick="nextMonth()">&#8250;</button>
      </div>
    </div>
    <div class="mini-grid" id="miniGrid"></div>

    <div class="sidebar-section-title">My calendars</div>
    <label class="cal-item"><input type="checkbox" checked onchange="toggleCal('personal')"> <span class="cal-dot" style="background:#6d4aff"></span> Personal</label>
    <label class="cal-item"><input type="checkbox" checked onchange="toggleCal('work')"> <span class="cal-dot" style="background:#4a9eff"></span> Work</label>
    <label class="cal-item"><input type="checkbox" checked onchange="toggleCal('other')"> <span class="cal-dot" style="background:#3db88a"></span> Other</label>

    <div class="sidebar-section-title" style="margin-top:18px">Other calendars</div>
    <label class="cal-item"><input type="checkbox" checked> <span class="cal-dot" style="background:#f0c040"></span> Holidays</label>
  </aside>

  <!-- MAIN GRID -->
  <main>
    <div class="cal-grid-header" id="calDowHeader"></div>
    <div class="cal-grid" id="calGrid"></div>
  </main>
</div>

<!-- NEW/EDIT EVENT MODAL -->
<div class="modal-overlay" id="eventModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title-row">
      <span class="modal-title" id="modalTitle">New event</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Event title</label>
      <input class="form-input" id="eventTitle" type="text" placeholder="Add title" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input class="form-input" id="eventDate" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">Time (optional)</label>
      <input class="form-input" id="eventTime" type="time" placeholder="All day">
    </div>
    <div class="form-group">
      <label class="form-label">Calendar</label>
      <select class="form-input" id="eventCal">
        <option value="personal">Personal</option>
        <option value="work">Work</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Color</label>
      <div class="color-row" id="colorRow">
        <div class="color-swatch selected" style="background:#6d4aff" data-color="#6d4aff" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#4a9eff" data-color="#4a9eff" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#3db88a" data-color="#3db88a" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#e5584a" data-color="#e5584a" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#f0c040" data-color="#f0c040" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#e07bb5" data-color="#e07bb5" onclick="selectColor(this)"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEvent()">Save</button>
    </div>
  </div>
</div>

<!-- EVENT DETAIL POPOVER -->
<div class="popover" id="eventPopover">
  <div class="popover-title" id="popTitle"></div>
  <div class="popover-date" id="popDate"></div>
  <div class="popover-actions">
    <button class="popover-btn" onclick="editFromPop()">✏ Edit</button>
    <button class="popover-btn danger" onclick="deleteFromPop()">🗑 Delete</button>
    <button class="popover-btn" onclick="closePop()">✕</button>
  </div>
</div>

<script>
// ── STATE ──
let today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth(); // 0-indexed
let selectedDate = null;
let hiddenCals = new Set();
let editingEventId = null;
let popEventId = null;
let selectedColor = '#6d4aff';

let events = JSON.parse(localStorage.getItem('cal_events') || '[]');

function saveEvents() {
  localStorage.setItem('cal_events', JSON.stringify(events));
}

// ── UTILS ──
function uid() { return Math.random().toString(36).slice(2); }
function fmtD(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function addDays(d, n) { let r = new Date(d); r.setDate(r.getDate()+n); return r; }
function parseDate(s) { let [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }
function monthName(m) { return ['January','February','March','April','May','June','July','August','September','October','November','December'][m]; }
function shortMonth(m) { return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m]; }

// ── RENDER ──
function render() {
  renderHeader();
  renderMini();
  renderGrid();
}

function renderHeader() {
  document.getElementById('headerTitle').textContent = monthName(viewMonth) + ' ' + viewYear;
}

function renderMini() {
  document.getElementById('miniTitle').textContent = shortMonth(viewMonth) + ' ' + viewYear;
  const grid = document.getElementById('miniGrid');
  grid.innerHTML = '';
  ['S','M','T','W','T','F','S'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'mini-dow';
    el.textContent = d;
    grid.appendChild(el);
  });
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const prevDays = new Date(viewYear, viewMonth, 0).getDate();
  const todayStr = fmtD(today);
  for (let i = 0; i < 42; i++) {
    const el = document.createElement('div');
    el.className = 'mini-day';
    let dateStr, num, otherMonth = false;
    if (i < firstDay) {
      num = prevDays - firstDay + i + 1;
      dateStr = fmtD(new Date(viewYear, viewMonth-1, num));
      otherMonth = true;
    } else if (i >= firstDay + daysInMonth) {
      num = i - firstDay - daysInMonth + 1;
      dateStr = fmtD(new Date(viewYear, viewMonth+1, num));
      otherMonth = true;
    } else {
      num = i - firstDay + 1;
      dateStr = fmtD(new Date(viewYear, viewMonth, num));
    }
    el.textContent = num;
    if (otherMonth) el.classList.add('other-month');
    if (dateStr === todayStr) el.classList.add('today');
    if (selectedDate && dateStr === selectedDate) el.classList.add('selected');
    el.addEventListener('click', () => { selectedDate = dateStr; render(); });
    grid.appendChild(el);
  }
}

function renderGrid() {
  const dowHeader = document.getElementById('calDowHeader');
  dowHeader.innerHTML = '';
  ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].forEach((d,i) => {
    const el = document.createElement('div');
    el.className = 'cal-dow' + (i===0||i===6?' weekend':'');
    el.textContent = d;
    dowHeader.appendChild(el);
  });

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const prevDays = new Date(viewYear, viewMonth, 0).getDate();
  const todayStr = fmtD(today);

  for (let i = 0; i < 42; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    let num, dateStr, otherMonth = false;
    if (i < firstDay) {
      num = prevDays - firstDay + i + 1;
      dateStr = fmtD(new Date(viewYear, viewMonth-1, num));
      otherMonth = true;
    } else if (i >= firstDay + daysInMonth) {
      num = i - firstDay - daysInMonth + 1;
      dateStr = fmtD(new Date(viewYear, viewMonth+1, num));
      otherMonth = true;
    } else {
      num = i - firstDay + 1;
      dateStr = fmtD(new Date(viewYear, viewMonth, num));
    }
    if (otherMonth) cell.classList.add('other-month');
    if (dateStr === todayStr) cell.classList.add('today');
    if (selectedDate && dateStr === selectedDate) cell.classList.add('selected');

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = num;
    cell.appendChild(numEl);

    // Events for this day
    const dayEvents = events.filter(e => e.date === dateStr && !hiddenCals.has(e.cal));
    dayEvents.slice(0,3).forEach(ev => {
      const pill = document.createElement('div');
      pill.className = 'event-pill';
      pill.style.background = ev.color + '33';
      pill.style.color = ev.color;
      pill.style.borderLeft = '2.5px solid ' + ev.color;
      pill.textContent = (ev.time ? ev.time + ' ' : '') + ev.title;
      pill.addEventListener('click', e => { e.stopPropagation(); showPop(ev.id, e); });
      cell.appendChild(pill);
    });
    if (dayEvents.length > 3) {
      const more = document.createElement('div');
      more.style.cssText = 'font-size:11px;color:var(--text-muted);padding:1px 4px;';
      more.textContent = '+' + (dayEvents.length - 3) + ' more';
      cell.appendChild(more);
    }

    cell.addEventListener('click', () => {
      selectedDate = dateStr;
      closePop();
      openNewEventModal(dateStr);
    });
    grid.appendChild(cell);
  }
}

// ── NAVIGATION ──
function prevMonth() { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } render(); }
function nextMonth() { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } render(); }
function goToday() { viewYear = today.getFullYear(); viewMonth = today.getMonth(); selectedDate = fmtD(today); render(); }

// ── MODAL ──
function openNewEventModal(dateStr) {
  editingEventId = null;
  document.getElementById('modalTitle').textContent = 'New event';
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventDate').value = dateStr || fmtD(today);
  document.getElementById('eventTime').value = '';
  document.getElementById('eventCal').value = 'personal';
  selectedColor = '#6d4aff';
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('selected', s.dataset.color === selectedColor));
  document.getElementById('eventModal').classList.add('open');
  setTimeout(() => document.getElementById('eventTitle').focus(), 50);
}

function openEditModal(ev) {
  editingEventId = ev.id;
  document.getElementById('modalTitle').textContent = 'Edit event';
  document.getElementById('eventTitle').value = ev.title;
  document.getElementById('eventDate').value = ev.date;
  document.getElementById('eventTime').value = ev.time || '';
  document.getElementById('eventCal').value = ev.cal;
  selectedColor = ev.color;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('selected', s.dataset.color === selectedColor));
  document.getElementById('eventModal').classList.add('open');
}

function closeModal() { document.getElementById('eventModal').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === e.currentTarget) closeModal(); }

function saveEvent() {
  const title = document.getElementById('eventTitle').value.trim();
  if (!title) { document.getElementById('eventTitle').focus(); return; }
  const ev = {
    id: editingEventId || uid(),
    title,
    date: document.getElementById('eventDate').value,
    time: document.getElementById('eventTime').value,
    cal: document.getElementById('eventCal').value,
    color: selectedColor,
  };
  if (editingEventId) {
    const idx = events.findIndex(e => e.id === editingEventId);
    if (idx !== -1) events[idx] = ev;
  } else {
    events.push(ev);
  }
  saveEvents();
  closeModal();
  render();
}

function selectColor(el) {
  selectedColor = el.dataset.color;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

// ── POPOVER ──
function showPop(id, e) {
  const ev = events.find(x => x.id === id);
  if (!ev) return;
  popEventId = id;
  document.getElementById('popTitle').textContent = ev.title;
  const d = parseDate(ev.date);
  const dateStr = d.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric'});
  document.getElementById('popDate').textContent = (ev.time ? ev.time + ' · ' : '') + dateStr;
  const pop = document.getElementById('eventPopover');
  pop.classList.add('open');
  const rect = e.target.getBoundingClientRect();
  let left = rect.right + 8;
  let top = rect.top;
  if (left + 250 > window.innerWidth) left = rect.left - 258;
  if (top + 120 > window.innerHeight) top = window.innerHeight - 130;
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
}
function closePop() { document.getElementById('eventPopover').classList.remove('open'); popEventId = null; }
function editFromPop() { const ev = events.find(x => x.id === popEventId); closePop(); if (ev) openEditModal(ev); }
function deleteFromPop() { events = events.filter(e => e.id !== popEventId); saveEvents(); closePop(); render(); }

// ── CAL TOGGLE ──
function toggleCal(cal) { hiddenCals.has(cal) ? hiddenCals.delete(cal) : hiddenCals.add(cal); render(); }

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closePop(); }
  if (e.key === 'Enter' && document.getElementById('eventModal').classList.contains('open') && document.activeElement !== document.querySelector('.btn-cancel')) saveEvent();
});
document.addEventListener('click', e => {
  const pop = document.getElementById('eventPopover');
  if (pop.classList.contains('open') && !pop.contains(e.target)) closePop();
});

// ── INIT ──
goToday();
</script>
</body>
